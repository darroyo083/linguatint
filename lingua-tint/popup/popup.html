<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguaTint</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>LinguaTint</h1>

    <section class="section">
      <label class="toggle-row">
        <span class="toggle-label">Habilitado</span>
        <label class="switch">
          <input type="checkbox" id="enabled">
          <span class="slider"></span>
        </label>
      </label>
    </section>

    <section class="section">
      <h2>Ámbito</h2>
      <label class="radio-row">
        <input type="radio" name="siteMode" value="notebooklm">
        <span>Solo NotebookLM</span>
      </label>
      <label class="radio-row">
        <input type="radio" name="siteMode" value="all">
        <span>Todas las webs</span>
      </label>
    </section>

    <section class="section">
      <h2>Idiomas y colores</h2>

      <div class="color-row">
        <span class="lang-tag lang-de">DE</span>
        <span class="lang-name">Alemán</span>
        <label class="switch">
          <input type="checkbox" id="germanEnabled">
          <span class="slider"></span>
        </label>
        <input type="color" id="germanColor" class="color-picker">
      </div>

      <div class="color-row">
        <span class="lang-tag lang-es">ES</span>
        <span class="lang-name">Español</span>
        <label class="switch">
          <input type="checkbox" id="spanishEnabled">
          <span class="slider"></span>
        </label>
        <input type="color" id="spanishColor" class="color-picker">
      </div>

      <div class="preview">
        <span class="preview-de">der Hund</span>
        <span class="preview-sep"> — </span>
        <span class="preview-es">el perro</span>
      </div>
    </section>
  </div>
  <script src="../content/defaults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
